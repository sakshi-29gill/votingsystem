<!DOCTYPE html>
<html>
<head>
    <title>Results</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">
    <h2>📊 Live Voting Results</h2>
    <canvas id="voteChart"></canvas>
</div>

<script>
    // FIX: wrap JSON inside backticks for safety
    const results = JSON.parse('{{ results | tojson | safe }}');

    const labels = results.map(item => item[0]);
    const data = results.map(item => item[1]);

    const ctx = document.getElementById('voteChart').getContext('2d');

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Votes',
                data: data
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
</script>

</body>
</html>
